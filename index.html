<section id="contact" class="py-24 px-6 max-w-3xl mx-auto">
    <div class="text-center mb-12">
        <h2 class="serif text-5xl mb-4 gold-text">Inquire</h2>
        <p class="text-gray-500 uppercase tracking-widest text-xs">Bespoke Consultations Only</p>
    </div>
    
    <div id="success-message" class="hidden opacity-0 transition-opacity duration-1000 text-center p-12 glass border-gold-text mb-8">
        <div class="mb-4 flex justify-center">
            <svg class="w-12 h-12 gold-text" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h3 class="serif text-3xl gold-text mb-2">Message Dispatched</h3>
        <p class="text-gray-400">Your vision has been securely transmitted. Our architects will contact you shortly.</p>
    </div>

    <form action="https://formspree.io/f/xdalqeqq" method="POST" id="luxury-form" class="space-y-8 transition-all duration-700">
        <div class="grid md:grid-cols-2 gap-8">
            <input type="text" name="name" id="name" placeholder="YOUR NAME" required class="w-full bg-transparent border-b border-zinc-800 py-4 focus:outline-none transition text-white placeholder-zinc-700">
            <input type="email" name="email" id="email" placeholder="EMAIL ADDRESS" required class="w-full bg-transparent border-b border-zinc-800 py-4 focus:outline-none transition text-white placeholder-zinc-700">
        </div>
        <textarea name="message" id="message" placeholder="DESCRIBE YOUR VISION" rows="5" class="w-full bg-transparent border-b border-zinc-800 py-4 focus:outline-none transition text-white placeholder-zinc-700"></textarea>
        
        <button type="submit" id="submit-btn" class="relative w-full py-5 gradient-gold text-black font-bold uppercase tracking-[0.4em] hover:shadow-[0_0_25px_rgba(212,175,55,0.4)] transition-all overflow-hidden">
            <span id="btn-text">Send Submission</span>
            <div id="btn-loader" class="hidden absolute inset-0 flex items-center justify-center bg-[#D4AF37]">
                <svg class="animate-spin h-6 w-6 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
        </button>
    </form>
</section>

<script>
    const luxuryForm = document.getElementById('luxury-form');
    const successBox = document.getElementById('success-message');
    const btnText = document.getElementById('btn-text');
    const btnLoader = document.getElementById('btn-loader');
    const submitBtn = document.getElementById('submit-btn');

    async function handleSubmit(event) {
        event.preventDefault();
        
        // 1. Start Luxury Loading State
        btnText.classList.add('opacity-0');
        btnLoader.classList.remove('hidden');
        submitBtn.disabled = true;
        luxuryForm.style.pointerEvents = "none";

        const data = new FormData(event.target);

        try {
            const response = await fetch(event.target.action, {
                method: luxuryForm.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                // 2. Success Transition: Fade out form, Fade in success
                luxuryForm.style.opacity = "0";
                setTimeout(() => {
                    luxuryForm.classList.add('hidden');
                    successBox.classList.remove('hidden');
                    // Trigger fade-in for success box
                    setTimeout(() => successBox.classList.add('opacity-100'), 50);
                }, 700);
            } else {
                throw new Error('Submission Failed');
            }
        } catch (error) {
            // 3. Error Handling
            btnText.classList.remove('opacity-0');
            btnLoader.classList.add('hidden');
            btnText.innerHTML = "RETRY SUBMISSION";
            submitBtn.disabled = false;
            luxuryForm.style.pointerEvents = "auto";
        }
    }
    
    luxuryForm.addEventListener("submit", handleSubmit);
</script>
